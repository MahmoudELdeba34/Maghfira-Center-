<section class="page-header">
    <div class="container text-center">
        <h1>العيادات المتخصصة</h1>
        <p>نخبة من أفضل الاستشاريين في كافة التخصصات الطبية لضمان حصولك على الرعاية التي تستحقها.</p>
    </div>
</section>

<section class="clinics-list py-5">
    <div class="container">
        <div class="clinics-grid">
            <div class="clinic-card-detailed" *ngFor="let clinic of clinics">
                <div class="card-icon" [ngClass]="clinic.color">
                    <!-- Mapping icons to simple SVG representation or font-awesome/manual -->
                    <svg *ngIf="clinic.icon === 'heart'" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                    <svg *ngIf="clinic.icon === 'child'" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm3 7h-6v6h2v4h2v-4h2v-6z"></path>
                    </svg>
                    <svg *ngIf="clinic.icon === 'brain'" viewBox="0 0 24 24" fill="currentColor">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path
                            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                        </path>
                    </svg>
                    <!-- Fallback generic icon for brevity -->
                    <svg *ngIf="clinic.icon !== 'heart' && clinic.icon !== 'child' && clinic.icon !== 'brain'"
                        viewBox="0 0 24 24" fill="currentColor">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                        <line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                </div>
                <h3>{{ clinic.title }}</h3>
                <p>{{ clinic.description }}</p>
                <div class="card-actions">
                    <button class="btn btn-outline btn-sm" [routerLink]="['/booking']"
                        [queryParams]="{specialty: clinic.title}">حجز موعد</button>
                </div>
            </div>
        </div>
    </div>
</section>
