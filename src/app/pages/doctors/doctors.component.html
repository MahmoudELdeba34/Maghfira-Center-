<section class="doctors-intro py-5 mt-5">
    <div class="container text-center">
        <h1 class="display-4 fw-bold mb-3">نخبة من كبار الأطباء والاستشاريين</h1>
        <p class="lead text-muted mx-auto" style="max-width: 800px;">
            نفخر في مركز المغفرة الطبي بضم فريق متميز من الأطباء ذوي الخبرات الطويلة العلمية والعملية، المكرسين لتقديم
            أفضل رعاية طبية ممكنة.
        </p>
    </div>
</section>

<!-- Doctor Schedule Details — using standalone DoctorScheduleComponent -->
<app-doctor-schedule *ngIf="selectedDoctor" [doctor]="selectedDoctor" (closeDetails)="closeDetails()">
</app-doctor-schedule>

<section class="doctors-gallery py-5">
    <div class="container">
        <div class="filters mb-5">
            <button class="filter-btn active">الكل</button>
            <button class="filter-btn">جراحة</button>
            <button class="filter-btn">باطنة</button>
            <button class="filter-btn">أطفال</button>
            <button class="filter-btn">أشعة</button>
        </div>

        <div class="doctors-grid">
            <div class="doctor-card" *ngFor="let doc of doctors" (click)="selectDoctor(doc)">
                <div class="doctor-img">
                    <img [src]="doc.image" [alt]="doc.name">
                    <div class="overlay">
                        <button class="btn btn-primary btn-sm">عرض الجدول</button>
                    </div>
                </div>
                <div class="doctor-info">
                    <h3>{{ doc.name }}</h3>
                    <span class="specialty">{{ doc.specialty }}</span>
                    <p class="degree">{{ doc.degree }}</p>
                    <div class="actions">
                        <button class="btn btn-outline-primary btn-sm w-100 mt-2">عرض المواعيد</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
